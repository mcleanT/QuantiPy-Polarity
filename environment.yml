name: quantipy
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.11
  - pip
  # Scientific stack pinned to ranges matched by pyproject.toml [project.optional-dependencies.pipeline]
  - numpy=1.26.*
  - scipy=1.11.*
  - pandas=2.1.*
  - pyarrow=14.*
  - tifffile=2024.*
  - scikit-image=0.22.*
  - matplotlib=3.8.*
  - jinja2=3.1.*
  - tqdm=4.66.*
  - requests=2.31.*
  # Phase 1 deps (core CLI)
  - click=8.1.*
  - pydantic=2.5.*
  - pyyaml=6.0.*
  - structlog=24.1.*
  # Dev
  - pytest=7.4.*
  - pytest-cov=4.1.*
  - ruff=0.3.*
  # pip-only
  - pip:
      - nd2reader>=3.3,<4
      - cellpose>=3.0,<4
      - -e .
